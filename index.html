<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo</title>
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1A2980, #26D0CE);
        }

        * {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif, 'Poppins', sans-serif;
        }

        .container {
            background: transparent;
            border: 2px solid white;
            padding: 20px 30px;
            position: absolute;
            transform: translate(-50%, -50%);
            left: 50%;
            top: 50%;
            margin: 20px auto;
            width: min(70%, 461px);
        }

        .top-field {
            background-color: #fff;
            min-width: 265px;
            border: 2px solid white;
            max-width: 456px;
        }

        #newtext {
            width: 67%;
            padding: 9px 10px;
            margin: 18px 17px;
            border: 1px solid grey;
            border-radius: 4px;
            font-size: 15px;
        }

        #newtext:focus {
            outline: none;
            border-color: #1A2980;
        }

        #addtask {
            font-weight: 500;
            padding: 9px 20px;
            background-color: #4747fffc;
            color: white;
            border: 1px solid black;
            border-radius: 4px;
            cursor: pointer;
        }

        #addtask:active {
            background-color: #fff;
            color: #1A2980;
            border: 2px solid #1A2980;
        }

        .tasks {
            padding: 25px 0;
            margin-top: 10px;
            position: relative;
            border-radius: 5px;
            background-color: #fff;
        }

        .task {
            background: white;
            border: none;
            box-shadow: none;
            display: flex;
            justify-content: space-between;
            margin: 0 20px;
            align-items: center;
            border-bottom: 2px solid #9b979773;
            cursor: pointer;
        }

        .delete {
            padding: 5px 10px;
            background: #4747fffc;
            color: white;
            border: none;
            border-radius: 30%;
            margin:3px 6px;
            cursor: pointer;
        }

        .delete:active {
            opacity: 0.7;
        }

        #taskname {
            padding: 8px 0;

        }

        #taskname.active {
            text-decoration: line-through;
        }

        .todo {
            margin-top: 5rem;
            font-size: 3.5rem;
            font-family: cursive;
            color: white;
        }

        .lists {
            color: white;
        }

        .midbox {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        @media only screen and (max-width: 600px) {
            .container {
                padding: 20px 15px;
                min-width: 295px;
            }

            .top-field {
                min-width: 285px;
                max-width: 440px;
            }

            #newtext {
                display: block;
                width: 77%;
                margin: 18px auto;

            }
            #addtask {
                width: 85%;
                margin: 15px 6px;
                margin-left: 20px;
            }
        }
    </style>
</head>

<body>
    <center>
        <h1 class="todo">TO-DO</h1>
    </center>
    <div class="container">
        <div class="top-field">
            <input id="newtext" type="text" placeholder="Task to be done...">
            <button id="addtask">ADD</button>
        </div>
        <div class="midbox">
            <h2 class="lists">todo List</h2>
            <button onclick="delAll()" id="addtask" style="height: 37px; width:70px;">Clear</button>
        </div>
        <div class="tasks" id="task-box"></div>
    </div>

</body>
<script src="index.js"></script>

</html>
